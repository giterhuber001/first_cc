<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<base href="/notes/">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日速记">
<link rel="manifest" href="manifest.json">
<title>每日速记</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
  <div class="date-nav">
    <button id="btn-prev" title="前一天 Ctrl+←">&lsaquo;</button>
    <span id="date-display"></span>
    <button id="btn-next" title="后一天 Ctrl+→">&rsaquo;</button>
    <button id="btn-today">今天</button>
    <button id="btn-calendar" title="月历">📅</button>
  </div>
  <div class="toolbar-right">
    <input type="text" id="search-input" placeholder="搜索 Ctrl+F" class="search-box">
    <div id="active-filter"></div>
  </div>
</div>

<!-- Mini Calendar -->
<div id="calendar-panel" style="display:none;">
  <div class="cal-nav">
    <button id="cal-prev">&lsaquo;</button>
    <span id="calendar-title"></span>
    <button id="cal-next">&rsaquo;</button>
  </div>
  <div id="calendar-grid"></div>
  <div class="cal-legend"><span class="cal-dot"></span> 有笔记</div>
</div>

<div id="input-zone">
  <textarea id="note-input" placeholder="写下此刻的想法...（Enter 保存）" rows="1"></textarea>
  <span id="live-time"></span>
</div>

<div id="divider">
  <span id="note-count"></span>
</div>

<div id="notes-grid"></div>

<!-- Detail Modal -->
<div id="modal-overlay" style="display:none;">
  <div id="modal-card">
    <div class="modal-header">
      <span class="modal-time"></span>
      <div class="modal-actions">
        <button class="modal-btn edit-btn" title="编辑">✎</button>
        <button class="modal-btn delete-btn" title="删除">🗑</button>
        <button class="modal-btn close-btn" title="关闭">✕</button>
      </div>
    </div>
    <div class="modal-body"></div>
    <div class="modal-tags"></div>
  </div>
</div>

<div id="toast"></div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
