<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<base href="/notes/">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日速记">
<meta name="theme-color" content="#1a1a2e">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>每日速记</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<div id="header">
  <button id="btn-prev">&lsaquo;</button>
  <span id="date-display"></span>
  <button id="btn-next">&rsaquo;</button>
  <button id="btn-today" class="header-btn">今天</button>
  <input type="text" id="search-input" placeholder="搜索..." class="search-box">
</div>

<!-- Notes Tab -->
<div id="tab-notes" class="tab-page">
  <div id="input-zone">
    <textarea id="note-input" placeholder="记下此刻的想法..." rows="1"></textarea>
    <span id="live-time"></span>
  </div>
  <div id="divider"><span id="note-count"></span></div>
  <div id="notes-grid"></div>
</div>

<!-- Calendar Tab -->
<div id="tab-calendar" class="tab-page" style="display:none;">
  <div class="cal-nav-header">
    <button id="cal-prev-month">&lsaquo;</button>
    <span id="cal-title-large">2026年5月</span>
    <button id="cal-next-month">&rsaquo;</button>
  </div>
  <div id="calendar-grid-full"></div>
  <div class="cal-legend"><span class="cal-dot"></span> 有笔记</div>
  <div id="cal-day-list"></div>
</div>

<!-- Bottom Sheet Overlay -->
<div id="sheet-overlay" style="display:none;">
  <div id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<!-- Bottom Tab Bar -->
<div id="tab-bar">
  <button class="tab-btn active" data-tab="notes">
    <span class="tab-icon">✍️</span>
    <span class="tab-label">笔记</span>
  </button>
  <button class="tab-btn" data-tab="calendar">
    <span class="tab-icon">📅</span>
    <span class="tab-label">月历</span>
  </button>
</div>

<!-- Active filter tag -->
<div id="active-filter"></div>

<!-- Toast -->
<div id="toast"></div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
